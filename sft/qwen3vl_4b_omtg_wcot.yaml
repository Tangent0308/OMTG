model: Qwen/Qwen3-VL-4B-Instruct
torch_dtype: bfloat16
use_hf: true

dataset:
  - data/cosmo-cap/train_filtered/train_pipeline_multi_refined_sft_with_cot.jsonl
  - data/moment10m/train_filtered/train_pipeline_multi_refined_sft_with_cot.jsonl
  - data/vtimellm/train_filtered/train_pipeline_multi_refined_sft_with_cot.jsonl
  - data/timelens-100k/train/train_w_cot_reasoning_32k.jsonl
load_from_cache_file: true
split_dataset_ratio: 0
dataloader_num_workers: 24
dataloader_prefetch_factor: 2

tuner_type: full
freeze_vit: true
freeze_llm: false
freeze_aligner: false

output_dir: checkpoints/sft_qwen3vl_4b_omtg_wcot
save_total_limit: 1
save_strategy: epoch
run_name: sft_qwen3vl_4b_omtg_wcot

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
sequence_parallel_size: 4
deepspeed: zero2
weight_decay: 0
warmup_ratio: 0.03
max_grad_norm: 1
lr_scheduler_type: cosine
num_train_epochs: 1
learning_rate: 1e-5
gradient_accumulation_steps: 4

report_to: tensorboard
